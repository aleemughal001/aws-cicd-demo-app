<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e3a8a, #2563eb);
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 20px;
    }

    .card {
      max-width: 700px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    }

    .badge {
      display: inline-block;
      background: #22c55e;
      color: #052e16;
      padding: 8px 16px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 15px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
      color: #e2e8f0;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      text-decoration: none;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: bold;
      transition: 0.3s ease;
    }

    .btn-primary {
      background: white;
      color: #1e3a8a;
    }

    .btn-primary:hover {
      background: #e2e8f0;
    }

    .btn-secondary {
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.1);
    }

    .footer {
      margin-top: 30px;
      font-size: 14px;
      color: #cbd5e1;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">CI/CD Deployment Successful</div>
    <h1>Welcome to My Demo App</h1>
    <p>
      This application was deployed automatically using
      <strong>AWS CodeCommit</strong>, <strong>CodeBuild</strong>,
      <strong>CodePipeline</strong>, and <strong>CodeDeploy</strong> on an EC2 instance.
    </p>

    <div class="buttons">
      <a href="#" class="btn btn-primary">Explore App</a>
      <a href="#" class="btn btn-secondary">View Pipeline</a>
    </div>

    <div class="footer">
      Built by Muhammad Ali Mughal
    </div>
  </div>
</body>
</html>
